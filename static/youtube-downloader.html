<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page-mode="all">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <main class="container">
      <header class="hero">
        <p class="tag">YouTube</p>
        <h1>YouTube Video Downloader</h1>
        <p class="subtitle">Analyze YouTube links, choose quality, and download video or audio quickly.</p>
        <div class="tool-links">
          <a href="/" class="tool-link">All Platforms</a>
          <a href="/instagram-downloader" class="tool-link">Instagram</a>
          <a href="/tiktok-downloader" class="tool-link">TikTok</a>
          <a href="/twitter-downloader" class="tool-link">Twitter</a>
          <a href="/video-to-mp3" class="tool-link">Video To MP3</a>
        </div>
        
      </header>

      <section class="panel">
        <form id="analyze-form" class="url-form">
          <label for="url-input">YouTube URL</label>
          <div class="row">
            <input
              id="url-input"
              type="url"
              required
              placeholder="https://www.youtube.com/watch?v=..."
              autocomplete="off"
            />
            <button id="analyze-btn" type="submit">Analyze</button>
          </div>
        </form>

        <p id="status" class="status"></p>

        <section id="result" class="result hidden">
          <div class="meta">
            <img id="thumb" alt="Thumbnail" class="thumb" />
            <div class="meta-text">
              <h2 id="title"></h2>
              <p id="uploader"></p>
              <p id="duration"></p>
            </div>
          </div>

          <div class="download-grid">
            <article class="card">
              <h3>Video download</h3>
              <label for="video-format">Quality</label>
              <select id="video-format"></select>
              <button id="download-video" type="button">Download Video</button>
            </article>

            <article class="card">
              <h3>Audio download</h3>
              <label for="audio-format-id">Source audio stream</label>
              <select id="audio-format-id"></select>

              <label for="audio-file-format">Final file format</label>
              <select id="audio-file-format">
                <option value="mp3">MP3</option>
                <option value="m4a">M4A</option>
                <option value="wav">WAV</option>
                <option value="opus">OPUS</option>
              </select>

              <button id="download-audio" type="button">Download Audio</button>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
