<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video To MP3</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page-mode="audio" data-default-audio-format="mp3">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <main class="container">
      <header class="hero">
        <p class="tag">MP3 Tool</p>
        <h1>Convert Video Link To MP3</h1>
        <p class="subtitle">Paste a video URL and download audio directly as MP3.</p>
        
        
      </header>

      <section class="panel">
        <form id="analyze-form" class="url-form">
          <label for="url-input">Video URL</label>
          <div class="row">
            <input id="url-input" type="url" required placeholder="https://example.com/video" autocomplete="off" />
            <button id="analyze-btn" type="submit">Analyze</button>
          </div>
        </form>

        <p id="status" class="status"></p>

        <section id="result" class="result hidden">
          <div class="meta">
            <img id="thumb" alt="Thumbnail" class="thumb" />
            <div class="meta-text">
              <h2 id="title"></h2>
              <p id="uploader"></p>
              <p id="duration"></p>
            </div>
          </div>

          <div class="download-grid">
            <article class="card">
              <h3>MP3 download</h3>
              <label for="audio-format-id">Source audio stream</label>
              <select id="audio-format-id"></select>

              <label for="audio-file-format">Final file format</label>
              <select id="audio-file-format" disabled>
                <option value="mp3" selected>MP3</option>
              </select>

              <button id="download-audio" type="button">Download MP3</button>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
