<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='//css/style.css') }}" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Media Toolkit</p>
        <h1>Media Forge</h1>
        <p class="subtitle">
          Download video/audio with quality control and convert files to new formats from one clean workspace.
        </p>
      </header>

      <section class="card">
        <div class="section-head">
          <h2>Video Downloader</h2>
          <span class="badge">yt-dlp powered</span>
        </div>

        <label for="video-url">Video URL</label>
        <div class="inline-input">
          <input id="video-url" type="url" placeholder="Paste YouTube or supported URL" />
          <button id="analyze-btn" class="btn btn-primary">Analyze</button>
        </div>

        <p class="hint">Download only content you own or are allowed to download.</p>

        <div id="video-meta" class="video-meta hidden">
          <img id="video-thumb" alt="Video thumbnail" />
          <div>
            <h3 id="video-title"></h3>
            <p id="video-uploader"></p>
            <p id="video-duration"></p>
          </div>
        </div>

        <div id="formats-panel" class="hidden">
          <div class="mode-switch">
            <button class="mode-btn active" data-mode="video" type="button">Video</button>
            <button class="mode-btn" data-mode="audio" type="button">Audio</button>
          </div>

          <label for="format-select">Quality</label>
          <select id="format-select"></select>

          <div id="audio-format-wrap" class="hidden">
            <label for="audio-format-select">Audio Output</label>
            <select id="audio-format-select">
              <option value="mp3">MP3</option>
              <option value="wav">WAV</option>
              <option value="m4a">M4A</option>
              <option value="flac">FLAC</option>
              <option value="ogg">OGG</option>
              <option value="opus">OPUS</option>
              <option value="aac">AAC</option>
            </select>
          </div>

          <button id="download-btn" class="btn btn-accent">Download</button>
        </div>

        <div id="download-result"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>File Converter</h2>
          <span class="badge">ffmpeg + helpers</span>
        </div>

        <form id="convert-form">
          <label for="convert-file">Choose File</label>
          <input id="convert-file" type="file" required />

          <label for="target-format">Convert To</label>
          <select id="target-format" required>
            <option value="">Select target format</option>
          </select>

          <button class="btn btn-primary" type="submit">Convert</button>
        </form>

        <div id="convert-result"></div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  </body>
</html>
